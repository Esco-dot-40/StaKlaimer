[phases.setup]
aptPkgs = ["wget", "ca-certificates", "fonts-liberation"]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install --with-deps chromium"
]

[variables]
# Force library paths for shared objects
LD_LIBRARY_PATH = "/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu"
# Prevent Playwright from searching common (but protected) dirs
PLAYWRIGHT_BROWSERS_PATH = "/tmp/pw-browsers"
