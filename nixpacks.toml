[phases.setup]
aptPkgs = [
  "chromium",
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxcb1",
  "libxkbcommon0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "xvfb",
  "fonts-liberation"
]

[phases.install]
cmds = [
  "npm install"
]

[variables]
CHROME_PATH = "/usr/bin/chromium"
LD_LIBRARY_PATH = "/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
