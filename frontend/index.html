<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Claimer | Never Miss a Stake Bonus</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00e701;
            --bg: #050a14;
            --card: rgba(16, 24, 39, 0.6);
            --border: rgba(0, 231, 1, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(0, 231, 1, 0.05) 0%, transparent 40%);
            color: #f8fafc;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 24px;
            height: 24px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .hero {
            max-width: 800px;
            margin: 80px auto;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        h1 span {
            color: var(--primary);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 800;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 231, 1, 0.3);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 231, 1, 0.4);
        }

        .dashboard {
            max-width: 1000px;
            margin: 80px auto;
            padding: 40px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }

        .dashboard h2 {
            margin-top: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .h-code {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .h-source {
            color: #64748b;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-success {
            color: #00e701;
            background: rgba(0, 231, 1, 0.1);
        }

        .status-fail {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .status-pending {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">
            <div class="logo-box"></div>
            Claimore
        </div>
        <a href="https://t.me/EnhancerAutomateBot?start=onboard" class="cta-btn"
            style="padding: 10px 20px; font-size: 0.9rem;">Login</a>
    </header>

    <div class="hero">
        <h1>Auto-Claim Your <span>Stake Bonuses</span> Instantly</h1>
        <p class="subtitle">Private, high-speed stealth claimer. We monitor drops oso you dont have to</p>
        <a href="https://t.me/EnhancerAutomateBot?start=onboard" class="cta-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
            </svg>
            Launch Via Telegram
        </a>
    </div>

    <div class="dashboard">
        <h2>
            <div
                style="width: 10px; height: 10px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary);">
            </div>
            Live Network History
        </h2>
        <div class="history-list" id="history-container">
            <div style="text-align: center; color: #64748b; padding: 20px;">Fetching recent drops...</div>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                // When hosted on Cloudflare (claim.veroe.fun), point to the Railway backend
                const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const backendUrl = isLocal ? '' : 'https://staklaimer-production.up.railway.app';

                const res = await fetch(`${backendUrl}/api/history`);
                const claims = await res.json();
                const container = document.getElementById('history-container');
                container.innerHTML = '';

                if (claims.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #64748b; padding: 20px;">No codes detected recently.</div>';
                    return;
                }

                claims.forEach(claim => {
                    const el = document.createElement('div');
                    el.className = 'history-item';

                    let statusClass = 'status-fail';
                    let statusText = claim.status || 'Failed';

                    if (statusText === 'Success') {
                        statusClass = 'status-success';
                    } else if (statusText === 'identified') {
                        statusClass = 'status-pending';
                        statusText = 'Pending';
                    } else if (statusText === 'Failed' || statusText.toLowerCase() === 'unknown') {
                        statusClass = 'status-fail';
                        statusText = 'Failed';
                    }

                    el.innerHTML = `
                        <div>
                            <div class="h-code">${claim.code}</div>
                            <div class="h-source">${claim.source}</div>
                        </div>
                        <div class="status-badge ${statusClass}">${statusText}</div>
                    `;
                    container.appendChild(el);
                });
            } catch (err) {
                console.error("Failed to load history", err);
            }
        }

        loadHistory();
        setInterval(loadHistory, 10000); // Reload every 10s
    </script>
</body>

</html>
